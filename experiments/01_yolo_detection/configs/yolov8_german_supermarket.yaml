# YOLOv8 Hyperparameters for German Supermarket Shelf Detection
# Simulates real-world conditions: glare, occlusion, dense packing

task: detect
mode: train

# Model
model: yolov8m.pt
epochs: 100
patience: 15

# Optimizer
optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3
warmup_momentum: 0.8

# Loss coefficients
box: 7.5
cls: 0.5
dfl: 1.5

# Augmentations - heavy to simulate German supermarket conditions
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10.0
translate: 0.1
scale: 0.5
shear: 2.0
perspective: 0.0001
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.1
copy_paste: 0.1
erasing: 0.4
crop_fraction: 1.0

# Overfitting prevention
dropout: 0.1
label_smoothing: 0.05
